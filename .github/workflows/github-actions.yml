name: build
on: [push, pull_request]
jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'check'
            python: '3.11'
            command: 'uv run ruff check . && uv run ruff format --check .'
            os: 'ubuntu-latest'
          - name: 'mypy'
            python: '3.11'
            command: 'uv run mypy edify tools'
            os: 'ubuntu-latest'
          - name: 'pyright'
            python: '3.11'
            command: 'uv run pyright'
            os: 'ubuntu-latest'
          - name: 'public-surface'
            python: '3.11'
            command: 'uv run python tools/surface.py --check'
            os: 'ubuntu-latest'
          - name: 'docs'
            python: '3.11'
            command: 'uv run --group docs sphinx-build -b html docs dist/docs && uv run --group docs sphinx-build -b linkcheck docs dist/docs'
            os: 'ubuntu-latest'
          - name: 'py311 (ubuntu)'
            python: '3.11'
            command: 'uv run pytest'
            os: 'ubuntu-latest'
          - name: 'pypy311 (ubuntu)'
            python: 'pypy-3.11'
            command: 'uv run pytest'
            os: 'ubuntu-latest'
          - name: 'py312 (ubuntu)'
            python: '3.12'
            command: 'uv run pytest'
            os: 'ubuntu-latest'
          - name: 'py313 (ubuntu)'
            python: '3.13'
            command: 'uv run pytest'
            os: 'ubuntu-latest'
          - name: 'py314 (ubuntu)'
            python: '3.14'
            command: 'uv run pytest'
            os: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: ${{ matrix.python }}
      - name: install graphviz system package
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: install dependencies
        run: uv sync --frozen --all-groups
      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  surface-migration-gate:
    name: 'public-surface migration gate'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: require a changes/ fragment when the public surface moves
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -q '\[no-migration\]'; then
              echo "PR marked [no-migration]; skipping the fragment requirement."
              exit 0
          fi
          if git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- .public-surface; then
              echo "Public surface unchanged; no fragment required."
              exit 0
          fi
          added_fragments=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" -- 'changes/*.rst' | grep -v 'changes/README.rst' || true)
          if [ -z "$added_fragments" ]; then
              echo "::error::.public-surface changed but no changes/ fragment was added. Add a fragment describing the migration, or mark the PR title with [no-migration]."
              exit 1
          fi
          echo "Public surface changed and a changes/ fragment accompanies it:"
          echo "$added_fragments"

  install-without-regex-extra:
    name: 'install: edify (no [regex] extra)'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.11'
      - name: install edify without any extra
        run: |
          uv venv .venv-bare
          uv pip install --python .venv-bare/bin/python .
      - name: import succeeds and re engine works; regex engine raises the friendly error
        run: |
          .venv-bare/bin/python <<'PYCHECK'
          import edify
          from edify.errors.backend import MissingRegexBackendError

          compiled_re = edify.RegexBuilder().digit().to_regex(engine="re")
          assert compiled_re.source == "\\d", compiled_re.source
          assert compiled_re.engine == "re"

          try:
              edify.RegexBuilder().digit().to_regex(engine="regex")
          except MissingRegexBackendError as reason:
              text = str(reason)
              assert "pip install edify[regex]" in text, text
          else:
              raise SystemExit("expected MissingRegexBackendError under bare install")
          PYCHECK

  install-with-regex-extra:
    name: 'install: edify[regex]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.11'
      - name: install edify[regex]
        run: |
          uv venv .venv-extra
          uv pip install --python .venv-extra/bin/python '.[regex]'
      - name: both engines compile; variable-width lookbehind works only under regex
        run: |
          .venv-extra/bin/python <<'PYCHECK'
          import edify
          from edify.errors.backend import VariableWidthLookbehindNotSupportedError

          for engine_choice in ("re", "regex"):
              compiled = edify.RegexBuilder().digit().to_regex(engine=engine_choice)
              assert compiled.source == "\\d", (engine_choice, compiled.source)
              assert compiled.engine == engine_choice

          variable_lookbehind_builder = (
              edify.RegexBuilder()
                  .assert_behind().between(1, 3).string("foo").end()
                  .string("bar")
          )
          try:
              variable_lookbehind_builder.to_regex(engine="re")
          except VariableWidthLookbehindNotSupportedError:
              pass
          else:
              raise SystemExit("expected VariableWidthLookbehindNotSupportedError under engine='re'")

          via_regex = variable_lookbehind_builder.to_regex(engine="regex")
          assert via_regex.search("foofoobar") is not None
          PYCHECK

  install-with-integration-extra:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'install: edify[pydantic]'
            extra: 'pydantic'
            probe: |
              import edify
              from edify.integrations.pydantic import pattern_validator
              from edify.library import email
              validate = pattern_validator(email)
              assert validate("a@b.com") == "a@b.com"
              try:
                  validate("bad")
              except ValueError:
                  pass
              else:
                  raise SystemExit("expected ValueError on non-matching input")
          - name: 'install: edify[fastapi]'
            extra: 'fastapi'
            probe: |
              import edify
              from edify.integrations.fastapi import pattern_query, pattern_path
              from edify.library import uuid
              from fastapi.params import Query, Path
              assert isinstance(pattern_query(uuid), Query)
              assert isinstance(pattern_path(uuid), Path)
          - name: 'install: edify[django]'
            extra: 'django'
            probe: |
              import edify
              from edify.integrations.django import pattern_validator
              from edify.library import uuid
              from django.core.exceptions import ValidationError
              from django.core.validators import RegexValidator
              validator = pattern_validator(uuid)
              assert isinstance(validator, RegexValidator)
              validator("01234567-89ab-1cde-8f01-23456789abcd")
              try:
                  validator("not-a-uuid")
              except ValidationError:
                  pass
              else:
                  raise SystemExit("expected ValidationError on non-matching input")
          - name: 'install: edify[all]'
            extra: 'all'
            probe: |
              import edify
              import pydantic
              import fastapi
              import django
              from edify.integrations import pydantic as edify_pydantic
              from edify.integrations import fastapi as edify_fastapi
              from edify.integrations import django as edify_django
              from edify.library import email
              assert edify_pydantic.pattern_validator(email)("a@b.com") == "a@b.com"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.11'
      - name: install edify[${{ matrix.extra }}]
        run: |
          uv venv .venv-${{ matrix.extra }}
          uv pip install --python .venv-${{ matrix.extra }}/bin/python '.[${{ matrix.extra }}]'
      - name: probe integration surface
        env:
          PROBE_SCRIPT: ${{ matrix.probe }}
        run: |
          .venv-${{ matrix.extra }}/bin/python -c "$PROBE_SCRIPT"

  bench:
    name: 'bench (advisory)'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.11'
      - name: install dependencies (includes bench group)
        run: uv sync --frozen --all-groups
      - name: run benchmarks against committed baseline (advisory only)
        run: |
          if [ -f tests/bench/baseline.json ]; then
              uv run pytest tests/bench/ --benchmark-compare=tests/bench/baseline.json --benchmark-compare-fail=mean:10% || true
          else
              uv run pytest tests/bench/ --benchmark-only || true
          fi
